name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  IMAGE: beedevztech/hive

jobs:
  release:
    name: Build, Scan & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write      # create GitHub Release
      security-events: write  # upload Trivy SARIF

    steps:
      - name: Checkout (full history for changelog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      # ── Tests (gate before publish) ───────────────────────────────
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: config-api/go.mod
          cache-dependency-path: config-api/go.sum

      - name: Run Go tests
        working-directory: config-api
        run: go test -race ./...

      # ── Changelog ─────────────────────────────────────────────────
      - name: Generate changelog
        uses: orhun/git-cliff-action@v3
        id: changelog
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      # ── Docker build ──────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image (local — for scanning)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          load: true
          build-args: VERSION=${{ steps.version.outputs.VERSION }}
          tags: ${{ env.IMAGE }}:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Security scan ─────────────────────────────────────────────
      - name: Trivy — container vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}:${{ steps.version.outputs.VERSION }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"          # fail pipeline on CRITICAL/HIGH CVEs
          ignore-unfixed: true    # skip vulnerabilities with no fix yet

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      # ── SBOM ──────────────────────────────────────────────────────
      - name: Generate SBOM (syft)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}:${{ steps.version.outputs.VERSION }}
          artifact-name: sbom-${{ steps.version.outputs.VERSION }}.spdx.json
          output-file: sbom.spdx.json

      # ── Push to Docker Hub ────────────────────────────────────────
      - name: Push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: VERSION=${{ steps.version.outputs.VERSION }}
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.VERSION }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha

      # ── GitHub Release ────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ${{ steps.changelog.outputs.content }}

            ---

            **Docker Hub**
            ```bash
            docker pull beedevztech/hive:${{ steps.version.outputs.VERSION }}
            ```

            **Update your server**
            ```bash
            VERSION=${{ steps.version.outputs.VERSION }} \
              docker compose -f docker-compose.prod.yml pull && \
              docker compose -f docker-compose.prod.yml up -d
            ```
          files: sbom.spdx.json
