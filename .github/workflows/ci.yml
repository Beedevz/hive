name: CI

on:
  push:
    branches: ["main", "develop", "feat/**", "fix/**", "chore/**"]
    paths-ignore:
      - "**.md"
      - ".github/dependabot.yml"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "**.md"

jobs:
  # ── Go: build + test + security ───────────────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: config-api

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: config-api/go.mod
          cache-dependency-path: config-api/go.sum

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: go-coverage
          path: config-api/coverage.out

      - name: gosec — Go security scanner
        uses: securego/gosec@master
        with:
          args: "-exclude-dir=adapters/testdata ./..."

  # ── Frontend: build + lint ────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
