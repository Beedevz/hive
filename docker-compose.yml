version: "3.9"

services:
  frontend:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - config-api
    restart: unless-stopped
    networks:
      - home-net

  config-api:
    build:
      context: ./config-api
      args:
        VERSION: ${VERSION:-dev}
    volumes:
      - ./config:/config
    env_file:
      - .env
    environment:
      - PORT=3001
    restart: unless-stopped
    networks:
      - home-net

networks:
  home-net:
    driver: bridge